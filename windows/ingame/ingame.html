<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Spell Tracker</title>
  <link rel="stylesheet" href="ingame.css">
</head>
<body>
  <div id="overlay">
    <div id="header">
      <span id="header-title">SPELL TRACKER</span>
      <span id="header-divider">·</span>
      <span id="status-dot" class="idle">●</span>
      <span id="status-text">AGUARDANDO</span>
      <button id="close-btn" title="Fechar">×</button>
    </div>

    <div id="rows-container"></div>

    <div id="toolbar">
      <button id="reset-btn" class="tb-btn">Reset</button>
      <button id="lucid-btn" class="tb-btn">Botas</button>
    </div>

    <div id="resize-grip"></div>
  </div>

  <!-- Scripts -->
  <script src="../../js/spell-data.js"></script>
  <script src="../../js/live-client-api.js"></script>
  <script src="ingame.js"></script>
</body>
</html>
